<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تحديد الموقع من الخريطة وإرساله إلى Google Sheets</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .header {
            padding: 1.5rem 1.8rem 0.5rem;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            color: #1e3c72;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #4a627a;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        #map {
            height: 400px;
            width: 100%;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            z-index: 1;
        }
        .info-panel {
            padding: 1.2rem 1.8rem;
            background: #f8fafc;
        }
        .selected-info {
            background: white;
            border-radius: 28px;
            padding: 12px 18px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .selected-info p {
            margin: 5px 0;
            font-size: 0.95rem;
        }
        .coord {
            font-family: monospace;
            color: #2a5298;
            font-weight: bold;
        }
        button {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 14px 20px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
            margin-top: 8px;
        }
        button:hover {
            transform: scale(0.98);
            background: linear-gradient(45deg, #0f2b4f, #1e3c72);
        }
        .message {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .loading {
            background: #e9ecef;
            color: #2a5298;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a3;
            padding: 0 1rem 1.2rem;
        }
        @media (max-width: 600px) {
            #map {
                height: 300px;
            }
            .info-panel {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📍 اختر موقعك على الخريطة</h1>
        <div class="sub">انقر على أي نقطة في الخريطة لتحديد الموقع</div>
    </div>
    <div id="map"></div>
    <div class="info-panel">
        <div class="selected-info">
            <p>🗺️ <strong>الموقع المحدد:</strong> <span id="locationName">لم يتم الاختيار بعد</span></p>
            <p>📌 <strong>الإحداثيات:</strong> <span id="coords" class="coord">-</span></p>
        </div>
        <button id="sendBtn">📤 إرسال الموقع إلى Google Sheets</button>
        <div id="statusMsg" class="message"></div>
    </div>
    <footer>سيتم حفظ الموقع والإحداثيات مع الوقت في جدول البيانات</footer>
</div>

<script>
    // ⚠️ ضع هنا رابط تطبيق Google Apps Script بعد النشر
    const GOOGLE_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';

    // تهيئة الخريطة (مركزها العالم العربي)
    const map = L.map('map').setView([24.7136, 46.6753], 5); // الرياض كمركز تقريبي
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    let currentMarker = null;
    let currentLat = null;
    let currentLng = null;
    let currentAddress = '';

    // دالة عكس الإحداثيات (للحصول على عنوان نصي)
    async function reverseGeocode(lat, lng) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=ar`);
            const data = await response.json();
            if (data && data.display_name) {
                // تنسيق مختصر: اسم الشارع، المنطقة، المدينة
                const address = data.address;
                let shortName = '';
                if (address.road) shortName += address.road;
                if (address.suburb) shortName += (shortName ? '، ' : '') + address.suburb;
                if (address.city || address.town) shortName += (shortName ? '، ' : '') + (address.city || address.town);
                if (address.country) shortName += (shortName ? '، ' : '') + address.country;
                return shortName || data.display_name.split(',')[0];
            }
            return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        } catch (error) {
            console.error("Reverse geocoding error:", error);
            return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        }
    }

    // عند النقر على الخريطة
    map.on('click', async function(e) {
        const { lat, lng } = e.latlng;
        currentLat = lat;
        currentLng = lng;

        // إزالة الماركر السابق وإضافة ماركر جديد
        if (currentMarker) map.removeLayer(currentMarker);
        currentMarker = L.marker([lat, lng]).addTo(map)
            .bindPopup(`📍 الموقع المحدد<br>${lat.toFixed(5)}, ${lng.toFixed(5)}`)
            .openPopup();

        // تحديث الإحداثيات في الواجهة
        document.getElementById('coords').innerText = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        document.getElementById('locationName').innerText = 'جاري جلب العنوان...';

        // جلب العنوان النصي
        const address = await reverseGeocode(lat, lng);
        currentAddress = address;
        document.getElementById('locationName').innerText = address;
    });

    // دالة الإرسال إلى Google Sheets
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('statusMsg');

    function showMessage(text, type) {
        statusDiv.style.display = 'block';
        statusDiv.textContent = text;
        statusDiv.className = `message ${type}`;
        setTimeout(() => {
            if (statusDiv.style.display === 'block') statusDiv.style.display = 'none';
        }, 4000);
    }

    async function sendToSheet() {
        if (currentLat === null || currentLng === null) {
            showMessage('⚠️ الرجاء النقر على الخريطة لتحديد موقع أولاً', 'error');
            return;
        }

        showMessage('⏳ جاري الإرسال إلى Google Sheets...', 'loading');

        const locationText = currentAddress || `${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;

        try {
            const formData = new URLSearchParams();
            formData.append('location', locationText);
            formData.append('lat', currentLat);
            formData.append('lng', currentLng);

            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (result.status === 'success') {
                showMessage('✅ تم حفظ الموقع في جدول البيانات بنجاح!', 'success');
                // اختيارياً: لا نمسح الماركر، فقط نؤكد
            } else {
                throw new Error(result.message || 'خطأ غير معروف');
            }
        } catch (error) {
            console.error(error);
            let msg = '❌ فشل الإرسال. تأكد من الرابط والإنترنت.';
            if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL') msg = '⚠️ لم يتم تعيين رابط Google Apps Script بعد. اتبع التعليمات.';
            showMessage(msg, 'error');
        }
    }

    sendBtn.addEventListener('click', sendToSheet);

    // تنبيه إذا لم يتم تعيين الرابط
    if (GOOGLE_SCRIPT_URL === 'script.google.com/macros/s/AKfycbwek848ESigpvdzjwESGcWi7TpnyAoIZPYLX_MjNTkTYzysJq9lrrcIRgPReapA0n3BJQ/exec') {
        setTimeout(() => {
            showMessage('🔧 الرجاء تعيين رابط Google Apps Script في الكود', 'error');
        }, 500);
    }
</script>
</body>
</html>
